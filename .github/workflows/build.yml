name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: win-build
          - os: macos-latest
            platform: mac
            artifact: mac-build
          - os: ubuntu-latest
            platform: linux
            artifact: linux-build

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 只上传安装包和更新元数据，排除 unpacked 目录和 Electron 运行时资源
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.blockmap
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/latest*.yml
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move release files to flat directory
        run: |
          mkdir -p dist
          find artifacts -type f \( \
            -name '*.exe' -o \
            -name '*.blockmap' -o \
            -name '*.dmg' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name 'latest*.yml' \
          \) -exec mv {} dist/ \;
          echo "Files to release:"
          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0-${{ github.run_number }}
          name: cc-gateway v2.0.0 Build #${{ github.run_number }}
          body: |
            cc-gateway 自动构建

            **构建编号**: #${{ github.run_number }}
            **提交**: ${{ github.sha }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
