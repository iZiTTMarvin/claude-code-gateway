appId: com.xuhaochen.cc-gateway
productName: cc-gateway
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules"
asar: true

win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  notarize: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
